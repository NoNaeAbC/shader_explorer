name: release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-release:
    runs-on: ubuntu-24.04
    env:
      LLVM_VERSION: '19'
      LLVM_CONFIG: llvm-config-19

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute Slang cache key
        id: slang-cache-key
        shell: bash
        run: |
          set -euo pipefail
          echo "commit=$(git -C slang rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Cache Cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Cache Slang build
        id: slang-cache
        uses: actions/cache@v4
        with:
          path: slang/__CMake_build_external
          key: ${{ runner.os }}-slang-${{ steps.slang-cache-key.outputs.commit }}-${{ hashFiles('build_slang.sh') }}

      - name: Configure LLVM apt repository
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gpg
          curl --fail -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/llvm-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-${LLVM_VERSION} main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            cmake \
            flex \
            git \
            glslang-tools \
            clang-${LLVM_VERSION} \
            libclang-${LLVM_VERSION}-dev \
            libclang-cpp${LLVM_VERSION}-dev \
            libclc-${LLVM_VERSION}-dev \
            libdrm-dev \
            libelf-dev \
            libexpat1-dev \
            libllvmspirvlib-${LLVM_VERSION}-dev \
            liblmdb-dev \
            libunwind-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-dri3-dev \
            libxcb-glx0-dev \
            libxcb-keysyms1-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxext-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libzstd-dev \
            lld-${LLVM_VERSION} \
            llvm-${LLVM_VERSION}-dev \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            python3-mako \
            wayland-protocols \
            zlib1g-dev

      - name: Install Meson
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user 'meson>=1.4,<2'
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          meson --version

      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@1.82.0

      - name: Install bindgen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v bindgen >/dev/null; then
            cargo install --locked bindgen-cli --version 0.71.1
          fi
          if ! command -v cbindgen >/dev/null; then
            cargo install --locked cbindgen --version 0.28.0
          fi
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Verify Rust binding tools
        run: |
          bindgen --help >/dev/null
          cbindgen --version

      - name: Verify external build dependencies
        shell: bash
        run: |
          set -euo pipefail
          glslangValidator --version
          "${LLVM_CONFIG}" --version
          clang-${LLVM_VERSION} --version
          rustc --version
          cargo --version
          bindgen --version
          cbindgen --version
          python3 -c 'import mako'
          for tool in cmake ninja pkg-config rustc cargo bindgen cbindgen bison flex "${LLVM_CONFIG}" "clang-${LLVM_VERSION}"; do
            command -v "${tool}" >/dev/null
          done
          for module in \
            expat \
            libdrm \
            libelf \
            libunwind \
            libzstd \
            wayland-client \
            wayland-server \
            x11 \
            x11-xcb \
            xcb \
            xcb-dri3 \
            xcb-glx \
            xcb-present \
            xcb-randr \
            xcb-shm \
            xcb-sync \
            xcb-xfixes \
            xext \
            xrandr \
            xshmfence \
            zlib; do
            pkg-config --exists "${module}"
          done

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n "s/.*version : '\\([^']*\\)'.*/\\1/p" meson.build | head -n 1)-${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify Slang artifacts
        id: slang-artifacts
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "slang/include/slang.h"
            "slang/__CMake_build_external/source/slang/slang-version-header/slang-tag-version.h"
            "slang/__CMake_build_external/Release/lib/libslang-compiler.a"
            "slang/__CMake_build_external/Release/lib/libcompiler-core.a"
            "slang/__CMake_build_external/Release/lib/libcore.a"
            "slang/__CMake_build_external/external/miniz/libminiz.a"
            "slang/__CMake_build_external/external/lz4/build/cmake/liblz4.a"
          )

          missing=0
          for path in "${required_files[@]}"; do
            if [[ ! -e "${path}" ]]; then
              echo "missing: ${path}"
              missing=1
            fi
          done

          if [[ "${missing}" -eq 0 ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build Slang
        if: steps.slang-cache.outputs.cache-hit != 'true' || steps.slang-artifacts.outputs.ready != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf slang/__CMake_build_external
          ./build_slang.sh

      - name: Re-verify Slang artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -e slang/__CMake_build_external/source/slang/slang-version-header/slang-tag-version.h
          test -e slang/__CMake_build_external/Release/lib/libslang-compiler.a
          test -e slang/__CMake_build_external/Release/lib/libcompiler-core.a
          test -e slang/__CMake_build_external/Release/lib/libcore.a
          test -e slang/__CMake_build_external/external/miniz/libminiz.a
          test -e slang/__CMake_build_external/external/lz4/build/cmake/liblz4.a

      - name: Configure Meson
        run: meson setup build --prefix "${PWD}/install"

      - name: Build project
        run: ninja -C build

      - name: Install project
        run: ninja -C build install

      - name: Package release archive
        id: package
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x tools/package_release.sh
          archive="$(./tools/package_release.sh "${{ steps.version.outputs.value }}" linux x86_64 "${PWD}/install" "${PWD}/dist")"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Smoke test packaged tree
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="${PWD}/package-smoke-test"
          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"
          tar -xzf "${{ steps.package.outputs.archive }}" -C "${stage_dir}"
          package_root="$(find "${stage_dir}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          "${package_root}/bin/shader_explorer" --version
          "${package_root}/bin/shader_explorer" --gpu intel-tgl "${PWD}/test_shader/complex_compute.slang" > /dev/null

      - name: Upload packaged artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: shader_explorer-linux-x86_64
          path: ${{ steps.package.outputs.archive }}

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
