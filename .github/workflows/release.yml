name: release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-release:
    runs-on: ubuntu-22.04
    env:
      LLVM_VERSION: '20'
      LLVM_CONFIG: llvm-config-20
      CLANG_PATH: /usr/lib/llvm-20/bin/clang
      CC: clang-20
      CXX: clang++-20
      CXXFLAGS: -stdlib=libc++
      LDFLAGS: -stdlib=libc++
      PKG_CONFIG_PATH: /usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Cache Cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Configure LLVM apt repository
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gpg
          curl --fail -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/llvm-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_VERSION} main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            cmake \
            flex \
            git \
            clang-${LLVM_VERSION} \
            libc++-${LLVM_VERSION}-dev \
            libc++abi-${LLVM_VERSION}-dev \
            libclang-${LLVM_VERSION}-dev \
            libclang-cpp${LLVM_VERSION}-dev \
            libclc-${LLVM_VERSION}-dev \
            libelf-dev \
            libexpat1-dev \
            liblmdb-dev \
            libpciaccess-dev \
            libzstd-dev \
            lld-${LLVM_VERSION} \
            llvm-${LLVM_VERSION}-dev \
            ninja-build \
            patchelf \
            pkg-config \
            python3 \
            python3-pip \
            python3-mako \
            zlib1g-dev

      - name: Install Meson
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user 'meson>=1.4,<2'
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          meson --version

      - name: Build pinned libdrm for Mesa on Jammy
        shell: bash
        run: |
          set -euo pipefail
          libdrm_version=2.4.121
          libdrm_archive="${RUNNER_TEMP}/libdrm-${libdrm_version}.tar.xz"
          libdrm_source_dir="${RUNNER_TEMP}/libdrm-${libdrm_version}"
          libdrm_build_dir="${RUNNER_TEMP}/libdrm-build"
          rm -rf "${libdrm_archive}" "${libdrm_source_dir}" "${libdrm_build_dir}"
          curl --fail -fsSL "https://dri.freedesktop.org/libdrm/libdrm-${libdrm_version}.tar.xz" -o "${libdrm_archive}"
          tar -xf "${libdrm_archive}" -C "${RUNNER_TEMP}"
          meson setup "${libdrm_build_dir}" "${libdrm_source_dir}" \
            --prefix=/usr/local \
            --buildtype=release \
            --auto-features=disabled \
            -Damdgpu=enabled \
            -Dcairo-tests=disabled \
            -Dman-pages=disabled \
            -Dtests=false \
            -Dvalgrind=disabled
          ninja -C "${libdrm_build_dir}"
          sudo ninja -C "${libdrm_build_dir}" install
          sudo ldconfig
          pkg-config --modversion libdrm
          pkg-config --modversion libdrm_amdgpu

      - name: Build pinned glslang validator for Mesa
        shell: bash
        run: |
          set -euo pipefail
          glslang_url="$(sed -n 's/^url = //p' subprojects/glslang.wrap)"
          glslang_revision="$(sed -n 's/^revision = //p' subprojects/glslang.wrap)"
          glslang_root="${RUNNER_TEMP}/glslang-src"
          glslang_build="${RUNNER_TEMP}/glslang-build"
          rm -rf "${glslang_root}" "${glslang_build}"
          git -c advice.detachedHead=false clone \
            --branch "${glslang_revision}" \
            --depth 1 \
            --recursive \
            "${glslang_url}" \
            "${glslang_root}"
          cmake -S "${glslang_root}" -B "${glslang_build}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="clang-${LLVM_VERSION}" \
            -DCMAKE_CXX_COMPILER="clang++-${LLVM_VERSION}" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DBUILD_SHARED_LIBS=OFF \
            -DGLSLANG_TESTS=OFF \
            -DGLSLANG_ENABLE_INSTALL=OFF \
            -DENABLE_GLSLANG_BINARIES=ON \
            -DENABLE_HLSL=OFF \
            -DENABLE_OPT=OFF
          cmake --build "${glslang_build}" --target glslang-standalone
          install -Dm755 "${glslang_build}/StandAlone/glslang" "${HOME}/.local/bin/glslang"
          install -Dm755 "${glslang_build}/StandAlone/glslangValidator" "${HOME}/.local/bin/glslangValidator"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install Rust 1.90 with rustfmt
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt

      - name: Ensure rustfmt is installed on Rust 1.90
        shell: bash
        run: |
          set -euo pipefail
          rustup component add rustfmt --toolchain 1.90.0-x86_64-unknown-linux-gnu

      - name: Install bindgen
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked bindgen-cli --version 0.72.1 --force
          cargo install --locked cbindgen --version 0.29.2 --force
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Verify Rust binding tools
        run: |
          rustfmt --version
          bindgen --help >/dev/null
          cbindgen --version

      - name: Verify external build dependencies
        shell: bash
        run: |
          set -euo pipefail
          glslangValidator --version
          "${LLVM_CONFIG}" --version
          clang-${LLVM_VERSION} --version
          clang++-${LLVM_VERSION} --version
          rustc --version
          cargo --version
          rustfmt --version
          bindgen --version
          cbindgen --version
          python3 -c 'import mako'
          patchelf --version
          printf '#include <print>\nint main() { std::println("{}" , 1); }\n' | \
            clang++-${LLVM_VERSION} -std=c++23 -stdlib=libc++ -x c++ - -fsyntax-only
          for tool in cmake ninja patchelf pkg-config rustc cargo rustfmt bindgen cbindgen bison flex glslangValidator "${LLVM_CONFIG}" "clang-${LLVM_VERSION}" "clang++-${LLVM_VERSION}"; do
            command -v "${tool}" >/dev/null
          done
          for module in \
            expat \
            libdrm \
            libelf \
            libzstd \
            zlib; do
            pkg-config --exists "${module}"
          done

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n "s/.*version : '\\([^']*\\)'.*/\\1/p" meson.build | head -n 1)-${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Configure Meson debug build before Slang
        run: meson setup build-debug --prefix "${PWD}/install" -Dci_debug_without_slang=true

      - name: Debug Nouveau bindgen environment
        shell: bash
        run: |
          set -euo pipefail
          env | sort
          bindgen --version
          cbindgen --version
          rustc --version
          cargo --version
          clang-${LLVM_VERSION} --version
          "${LLVM_CONFIG}" --version
          ldd "$(command -v bindgen)" || true
          printf 'LIBCLANG_PATH=%s\n' "${LIBCLANG_PATH-}"
          printf 'CLANG_PATH=%s\n' "${CLANG_PATH-}"
          printf 'CPATH=%s\n' "${CPATH-}"
          printf 'C_INCLUDE_PATH=%s\n' "${C_INCLUDE_PATH-}"
          printf 'CPLUS_INCLUDE_PATH=%s\n' "${CPLUS_INCLUDE_PATH-}"
          echo | clang-${LLVM_VERSION} -v -E -x c -
          echo | clang-${LLVM_VERSION} -dM -E -x c - | grep STDC || true
          printf '#include <stdatomic.h>\n' | clang-${LLVM_VERSION} -E -H -x c - >/dev/null
          printf '#include <stdatomic.h>\natomic_uint_fast32_t x;\n' | clang-${LLVM_VERSION} -x c -fsyntax-only -
          printf '#include <stdatomic.h>\natomic_uint_fast32_t x;\n' > /tmp/atomics_probe.h
          set +e
          bindgen /tmp/atomics_probe.h -- -x c >/tmp/atomics_probe_default.rs 2>/tmp/atomics_probe_default.err
          probe_default_status=$?
          bindgen /tmp/atomics_probe.h -- -x c -std=c11 >/tmp/atomics_probe_c11.rs 2>/tmp/atomics_probe_c11.err
          probe_c11_status=$?
          bindgen /tmp/atomics_probe.h -- -x c -std=gnu11 >/tmp/atomics_probe_gnu11.rs 2>/tmp/atomics_probe_gnu11.err
          probe_gnu11_status=$?
          bindgen /tmp/atomics_probe.h -- -x c -std=c23 >/tmp/atomics_probe_c23.rs 2>/tmp/atomics_probe_c23.err
          probe_c23_status=$?
          LD_DEBUG=libs bindgen /tmp/atomics_probe.h -- -x c >/tmp/atomics_probe_lddebug.rs 2>/tmp/atomics_probe_lddebug.err
          probe_lddebug_status=$?
          set -e
          echo "probe_default_status=${probe_default_status}"
          cat /tmp/atomics_probe_default.err || true
          echo "probe_c11_status=${probe_c11_status}"
          cat /tmp/atomics_probe_c11.err || true
          echo "probe_gnu11_status=${probe_gnu11_status}"
          cat /tmp/atomics_probe_gnu11.err || true
          echo "probe_c23_status=${probe_c23_status}"
          cat /tmp/atomics_probe_c23.err || true
          echo "probe_lddebug_status=${probe_lddebug_status}"
          grep -E 'libclang|calling init' /tmp/atomics_probe_lddebug.err || true
          cmd="$(ninja -C build-debug -t commands subprojects/mesa/src/nouveau/compiler/nak_bindings.rs | tail -n 1)"
          printf '%s\n' "${cmd}"

      - name: Validate Nouveau bindgen target before Slang
        run: ninja -C build-debug -v subprojects/mesa/src/nouveau/compiler/nak_bindings.rs

      - name: Build headless Mesa Vulkan driver before Slang
        run: ninja -C build-debug -v subprojects/mesa/src/intel/vulkan/libvulkan_intel.so

      - name: Validate Mesa Vulkan driver is headless
        shell: bash
        run: |
          set -euo pipefail
          driver="${PWD}/build-debug/subprojects/mesa/src/intel/vulkan/libvulkan_intel.so"
          ldd "${driver}" | tee /tmp/libvulkan_intel.ldd
          if grep -E 'libwayland|libX11|libxcb|libxrandr|libxshmfence' /tmp/libvulkan_intel.ldd; then
            echo "unexpected window-system dependency found in ${driver}" >&2
            exit 1
          fi

      - name: Compute Slang cache key
        id: slang-cache-key
        shell: bash
        run: |
          set -euo pipefail
          echo "commit=$(git -C slang rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Cache Slang build
        id: slang-cache
        uses: actions/cache@v4
        with:
          path: slang/__CMake_build_external
          key: ${{ runner.os }}-slang-${{ steps.slang-cache-key.outputs.commit }}-${{ hashFiles('build_slang.sh') }}

      - name: Verify Slang artifacts
        id: slang-artifacts
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "slang/include/slang.h"
            "slang/__CMake_build_external/source/slang/slang-version-header/slang-tag-version.h"
            "slang/__CMake_build_external/Release/lib/libslang-compiler.a"
            "slang/__CMake_build_external/Release/lib/libcompiler-core.a"
            "slang/__CMake_build_external/Release/lib/libcore.a"
            "slang/__CMake_build_external/external/miniz/libminiz.a"
            "slang/__CMake_build_external/external/lz4/build/cmake/liblz4.a"
          )

          missing=0
          for path in "${required_files[@]}"; do
            if [[ ! -e "${path}" ]]; then
              echo "missing: ${path}"
              missing=1
            fi
          done

          if [[ "${missing}" -eq 0 ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build Slang
        if: steps.slang-cache.outputs.cache-hit != 'true' || steps.slang-artifacts.outputs.ready != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf slang/__CMake_build_external
          ./build_slang.sh

      - name: Re-verify Slang artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -e slang/__CMake_build_external/source/slang/slang-version-header/slang-tag-version.h
          test -e slang/__CMake_build_external/Release/lib/libslang-compiler.a
          test -e slang/__CMake_build_external/Release/lib/libcompiler-core.a
          test -e slang/__CMake_build_external/Release/lib/libcore.a
          test -e slang/__CMake_build_external/external/miniz/libminiz.a
          test -e slang/__CMake_build_external/external/lz4/build/cmake/liblz4.a

      - name: Configure Meson
        run: meson setup build --prefix "${PWD}/install"

      - name: Build project
        run: ninja -C build

      - name: Install project
        run: ninja -C build install

      - name: Package release archive
        id: package
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x tools/bundle_runtime_deps.py
          chmod +x tools/package_release.sh
          archive="$(./tools/package_release.sh "${{ steps.version.outputs.value }}" linux x86_64 "${PWD}/install" "${PWD}/dist")"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Validate packaged runtime closure
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="${PWD}/package-runtime-check"
          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"
          tar -xzf "${{ steps.package.outputs.archive }}" -C "${stage_dir}"
          package_root="$(find "${stage_dir}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          python3 ./tools/bundle_runtime_deps.py --check-only "${package_root}"

      - name: Smoke test packaged tree
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="${PWD}/package-smoke-test"
          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"
          tar -xzf "${{ steps.package.outputs.archive }}" -C "${stage_dir}"
          package_root="$(find "${stage_dir}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          "${package_root}/bin/shader_explorer" --version
          "${package_root}/bin/shader_explorer" --gpu intel-tgl "${PWD}/test_shader/complex_compute.slang" > /dev/null

      - name: Upload packaged artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: shader_explorer-linux-x86_64
          path: ${{ steps.package.outputs.archive }}

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
